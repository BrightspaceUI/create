name: Publish
on:
  push:
    branches:
      - main
      - '[0-9]+.x'
      - '[0-9]+.[0-9]+.x'
jobs:
  publish:
    name: Publish
    runs-on: [self-hosted, AWS, Linux]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: Brightspace/third-party-actions@actions/checkout
      - name: Setup Node
        uses: Brightspace/setup-node@main
        with:
          node-version-file: .nvmrc
          d2l-registry-token: ${{ secrets.D2L_PACKAGE_REGISTRY_AUTH_TOKEN }}
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
<%= publishStep %>